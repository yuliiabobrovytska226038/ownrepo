version: 2

models:
  - name: int_vastgoedgegevens
    description: "FULL OUTER JOIN of VHE property data (vastgoedgegevens_vhe_gegevens) with complex property data (vastgoedgegevens_waarderingscomplexen)."
    columns:
      - name: "Corporatie"
        description: "Housing corporation name."
      - name: "Jaar"
        description: "Valuation year."
      - name: "Peildatum"
        description: "Valuation reference date (Dec 31)."
      - name: "VHE-nummer"
        description: "Unique rental unit identifier."
      - name: "Vastgoedcategorie"
        description: "Real estate asset category."
      - name: "Straatnaam"
        description: "Street name of the rental unit."
      - name: "Huisnummer"
        description: "House number of the rental unit."
      - name: "Toevoeging"
        description: "House number suffix or addition."
      - name: "Postcode"
        description: "Postal code of the rental unit."
      - name: "Waarderingscomplex"
        description: "Valuation complex identifier."
      - name: "Classificatie"
        description: "DAEB or Niet-DAEB classification."
      - name: "Bouwjaar"
        description: "Year the unit was built."
      - name: "Startdatum contract"
        description: "Rental contract start date."
      - name: "Renovatiejaar"
        description: "Year of the most recent renovation."
      - name: "Gebruiksoppervlakte"
        description: "Usable floor area in square metres."
      - name: "Zelfstandig"
        description: "Whether the unit is self-contained (independent)."
      - name: "WOZ-waarde primo jaar-1"
        description: "Municipal tax value (WOZ) at the start of the previous year."
      - name: "Achterstallig onderhoud"
        description: "Flag or amount for deferred maintenance."
      - name: "Leegstand"
        description: "Vacancy indicator for the rental unit."
      - name: "Netto huur"
        description: "Net rent amount."
      - name: "Methode maximale huur"
        description: "Method used to calculate the maximum rent."
      - name: "WWS-punten"
        description: "Housing quality score (Woningwaarderingsstelsel points)."
      - name: "Maximale huur excl. opslag"
        description: "Maximum rent excluding surcharge."
      - name: "Beschermd bezit"
        description: "Whether the unit is a protected property."
      - name: "Nieuwbouwopslag"
        description: "New-build rent surcharge."
      - name: "Segment huurregime"
        description: "Rent regulation segment (social or liberalised)."
      - name: "Markthuur"
        description: "Market rent for the unit."
      - name: "Beklemmingshuur"
        description: "Rent subject to a tenancy restriction."
      - name: "Laatste jaar huurbeklemming"
        description: "Final year of the tenancy rent restriction."
      - name: "EPV"
        description: "Energy performance fee charged to the tenant."
      - name: "Energieprestatie (EP2)"
        description: "Energy performance indicator (EP2 label)."
      - name: "Handboektype"
        description: "Property type per the valuation handbook."
      - name: "Erfpacht waardecorrectie doorexploiteren"
        description: "Ground-lease value correction for the hold (DCF) model."
      - name: "Erfpacht waardecorrectie uitponden"
        description: "Ground-lease value correction for the vacant-sale model."
      - name: "BVO (m2)"
        description: "Gross floor area in square metres."
      - name: "VVO (m2)"
        description: "Net lettable area in square metres."
      - name: "Aantal contracten"
        description: "Number of active rental contracts."
      - name: "Aantal plekken"
        description: "Number of parking or occupancy spots."
      - name: "Einddatum contract"
        description: "Rental contract end date."
      - name: "Nieuw huurcontract"
        description: "Indicator for a new rental contract."
      - name: "Looptijd bij herziening"
        description: "Remaining lease term at the review date."
      - name: "Contracttype"
        description: "Type of rental contract."
      - name: "Contracthuur jaar 1"
        description: "Contract rent in year 1 of the projection."
      - name: "Contracthuur jaar 2"
        description: "Contract rent in year 2 of the projection."
      - name: "Contracthuur jaar 3"
        description: "Contract rent in year 3 of the projection."
      - name: "Contracthuur jaar 4"
        description: "Contract rent in year 4 of the projection."
      - name: "Contracthuur jaar 5"
        description: "Contract rent in year 5 of the projection."
      - name: "Contracthuur jaar 6"
        description: "Contract rent in year 6 of the projection."
      - name: "Contracthuur jaar 7"
        description: "Contract rent in year 7 of the projection."
      - name: "Contracthuur jaar 8"
        description: "Contract rent in year 8 of the projection."
      - name: "Contracthuur jaar 9"
        description: "Contract rent in year 9 of the projection."
      - name: "Contracthuur jaar 10"
        description: "Contract rent in year 10 of the projection."
      - name: "Contracthuur jaar 11"
        description: "Contract rent in year 11 of the projection."
      - name: "Contracthuur jaar 12"
        description: "Contract rent in year 12 of the projection."
      - name: "Contracthuur jaar 13"
        description: "Contract rent in year 13 of the projection."
      - name: "Contracthuur jaar 14"
        description: "Contract rent in year 14 of the projection."
      - name: "Contracthuur jaar 15"
        description: "Contract rent in year 15 of the projection."
      - name: "Straatnaam (opgezocht)"
        description: "Street name resolved from address lookup."
      - name: "Gemeente (opgezocht)"
        description: "Municipality resolved from address lookup."
      - name: "Plaatsnaam (opgezocht)"
        description: "City or town name resolved from address lookup."
      - name: "Wijk (opgezocht)"
        description: "District resolved from address lookup."
      - name: "Buurt (opgezocht)"
        description: "Neighbourhood resolved from address lookup."
      - name: "Buurtcode (opgezocht)"
        description: "Neighbourhood code resolved from address lookup."
      - name: "BAG pand id (opgezocht)"
        description: "BAG building identifier resolved from address lookup."
      - name: "BAG verblijfsobject id (opgezocht)"
        description: "BAG dwelling-object identifier resolved from address lookup."
      - name: "Complexcode"
        description: "Valuation complex code."
      - name: "Complexnaam"
        description: "Valuation complex name."
      - name: "Werkmaatschappij"
        description: "Operating company (subsidiary) of the housing corporation."
      - name: "Waarderingsmodel"
        description: "Valuation model applied (doorexploiteren or uitponden)."
      - name: "Exploitatiebeperking 7 jaar"
        description: "Exploitation restriction flag for the first 7 years."
      - name: "Complexstatus"
        description: "Current operational status of the complex."
      - name: "Gesplitst"
        description: "Whether the complex has been split."
      - name: "Flexwoning"
        description: "Indicates if the unit is a temporary flex dwelling."
      - name: "Aangebroken"
        description: "Indicates if the complex is partially occupied or broken up."
      - name: "Mutatiekans"
        description: "Estimated annual vacancy turnover probability."
      - name: "Maximaal verkoopbaar (%)"
        description: "Maximum saleable share of units in the complex."
      - name: "Deelportefeuille"
        description: "Sub-portfolio classification."
      - name: "Referentiegroep"
        description: "Reference group used for benchmarking."
      - name: "_merge"
        description: "Join indicator showing the row source (left/right/both)."
