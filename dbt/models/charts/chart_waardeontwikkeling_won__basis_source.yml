version: 2

models:
  - name: chart_waardeontwikkeling_won__basis_source
    description: "Chart input source for woningen COROP metric maps. Grain: one row per VHE for the chart year. Required columns include corporation, COROP-plus code, waarderingstype, beleidsbeheer, beleidshuur, marktwaarde, beleidswaarde, leegwaarde, onderhoud, and disconteringsvoet."
    columns:
      - name: "VHE-nr"
        description: "Rental unit identifier (TMS VHE number)."
      - name: "Waarderingscomplex"
        description: "Valuation complex identifier."
      - name: "Corporatie"
        description: "Housing corporation name."
      - name: "Werkmaatschappij"
        description: "Operating subsidiary name."
      - name: "Vastgoedcategorie"
        description: "Real estate category (e.g. residential, commercial)."
      - name: "Classificatie"
        description: "Value classification or housing segment."
      - name: "Waarderingsmodel"
        description: "Valuation model used (e.g. DCF, comparable)."
      - name: "Handboektype"
        description: "Valuation handbook type applied."
      - name: "Jaar"
        description: "Valuation year."
      - name: "Peildatum"
        description: "Valuation reference date."
      - name: "Netto huur"
        description: "Net annual rent amount."
      - name: "WOZ-waarde"
        description: "Municipal property tax (WOZ) value."
      - name: "Marktwaarde"
        description: "Market value in the current year."
      - name: "Beleidswaarde"
        description: "Policy (social) value in the current year."
      - name: "Beschikbaarheid (scenario)"
        description: "Availability scenario discount component."
      - name: "Beschikbaarheid (eindwaarde)"
        description: "Availability end-value discount component."
      - name: "Beschikbaarheid (overdrachtskosten)"
        description: "Availability transfer-cost discount component."
      - name: "Beschikbaarheid (60 jaar)"
        description: "Availability 60-year component discount."
      - name: "Beschikbaarheid_totaal"
        description: "Total availability discount across all sub-components."
      - name: "Betaalbaarheid"
        description: "Affordability discount component of policy value."
      - name: "Kwaliteit (onderhoud)"
        description: "Quality maintenance discount component."
      - name: "Kwaliteit (EFG-labels)"
        description: "Quality EFG energy label discount component."
      - name: "Kwaliteit_totaal"
        description: "Total quality discount across all sub-components."
      - name: "Beheer"
        description: "Management discount component of policy value."
      - name: "Disconteringsvoet"
        description: "Discount rate applied in the valuation model."
      - name: "Beleidshuur"
        description: "Policy rent assumption used in the valuation."
      - name: "Beleidsonderhoud"
        description: "Policy maintenance cost assumption."
      - name: "Beleidsonderhoud_norm"
        description: "Normalised policy maintenance cost assumption."
      - name: "Beleidsbeheer_bp"
        description: "Policy management cost assumption (basis points)."
      - name: "Disconteringsvoet Beleidswaarde"
        description: "Discount rate used for policy value calculation."
      - name: "Postcode"
        description: "Postal code of the unit."
      - name: "Gemeentecode"
        description: "Municipality code."
      - name: "Aantal vrijheidsgraden toegepast"
        description: "Number of degrees of freedom applied in the valuation."
      - name: "% Full"
        description: "Share of portfolio in the Full (non-BASIC) sub-portfolio."
      - name: "Waarderingstype"
        description: "Valuation type (BASIC or FULL sub-portfolio)."
      - name: "Erfpacht waardecorrectie doorexploiteren basis"
        description: "Ground lease value correction for hold scenario (basis)."
      - name: "Erfpacht waardecorrectie uitponden basis"
        description: "Ground lease value correction for sell scenario (basis)."
      - name: "Erfpacht NCW"
        description: "Net present value of ground lease obligations."
      - name: "Marktwaarde_1"
        description: "Alternative market value column (internal reference)."
      - name: "Marktwaarde doorexploiteren"
        description: "Market value under the hold (continue-to-let) scenario."
      - name: "Marktwaarde uitponden"
        description: "Market value under the sell-on-vacancy scenario."
      - name: "Scenario_mb"
        description: "Applied valuation scenario (market basis)."
      - name: "Marktwaarde basis"
        description: "Market value under the basis (BASIC) scenario."
      - name: "Marktwaarde basis doorexploiteren"
        description: "Basis market value under the hold scenario."
      - name: "Marktwaarde basis uitponden"
        description: "Basis market value under the sell scenario."
      - name: "Scenario basis"
        description: "Applied scenario for the basis valuation."
      - name: "Erfpacht (EP)"
        description: "Indicator whether the unit has a ground lease."
      - name: "EP suppletie bij verkoop"
        description: "Ground lease supplement at sale."
      - name: "EP doorexploiteren jaar 1-15"
        description: "Ground lease cost for hold scenario years 1–15."
      - name: "EP uitponden jaar 1-15"
        description: "Ground lease cost for sell scenario years 1–15."
      - name: "EP waardecorrectie doorexploiteren"
        description: "Ground lease value correction for hold scenario."
      - name: "EP waardecorrectie uitponden"
        description: "Ground lease value correction for sell scenario."
      - name: "Bron disconteringsvoet (DV)"
        description: "Source indicator for the discount rate assumption."
      - name: "DV doorexploiteren"
        description: "Applied discount rate for the hold scenario."
      - name: "DV doorexploiteren handboek"
        description: "Handbook discount rate for the hold scenario."
      - name: "DV uitponden"
        description: "Applied discount rate for the sell scenario."
      - name: "DV uitponden handboek"
        description: "Handbook discount rate for the sell scenario."
      - name: "Bron leegwaarde (LW)"
        description: "Source indicator for the vacant (empty) value assumption."
      - name: "LW waarde"
        description: "Applied vacant value."
      - name: "LW handboek waarde"
        description: "Handbook vacant value."
      - name: "Bron markthuur (MH)"
        description: "Source indicator for the market rent assumption."
      - name: "MH waarde"
        description: "Applied market rent value."
      - name: "MH handboek waarde"
        description: "Handbook market rent value."
      - name: "Bron Onderhoud (OH)"
        description: "Source indicator for the maintenance cost assumption."
      - name: "OH doorexploiteren"
        description: "Applied maintenance cost for the hold scenario."
      - name: "OH doorexploiteren handboek"
        description: "Handbook maintenance cost for the hold scenario."
      - name: "OH uitponden"
        description: "Applied maintenance cost for the sell scenario."
      - name: "OH uitponden handboek"
        description: "Handbook maintenance cost for the sell scenario."
      - name: "Bron mutatiegraad doorexploiteren (MD)"
        description: "Source indicator for the turnover rate (hold) assumption."
      - name: "MD waarde"
        description: "Applied turnover rate."
      - name: "MD handboek waarde"
        description: "Handbook turnover rate."
      - name: "Bron mutatiegraad uitponden (MU)"
        description: "Source indicator for the sell-on-vacancy turnover rate."
      - name: "MU jaar 1-15"
        description: "Applied sell-on-vacancy turnover rate for years 1–15."
      - name: "MU jaar 1-15 handboek"
        description: "Handbook sell-on-vacancy turnover rate for years 1–15."
      - name: "Bron exit yield (EY)"
        description: "Source indicator for the exit yield assumption."
      - name: "EY doorexploiteren"
        description: "Applied exit yield for the hold scenario."
      - name: "EY doorexploiteren handboek"
        description: "Handbook exit yield for the hold scenario."
      - name: "EY uitponden"
        description: "Applied exit yield for the sell scenario."
      - name: "EY uitponden handboek"
        description: "Handbook exit yield for the sell scenario."
      - name: "Bron scenario (SC)"
        description: "Source indicator for the chosen valuation scenario."
      - name: "SC waarde"
        description: "Applied valuation scenario value."
      - name: "Bron mutatieonderhoud (MOH)"
        description: "Source indicator for the maintenance change assumption."
      - name: "Bron markthuurstijging (MHS)"
        description: "Source indicator for the market rent growth assumption."
      - name: "Bron leegwaardestijging verleden (LSV)"
        description: "Source indicator for historical vacant value growth."
      - name: "Bron leegwaardestijging (LS)"
        description: "Source indicator for the projected vacant value growth."
      - name: "Bron mutatiegraad doorexploiteren (MD)_1"
        description: "Duplicate source indicator for hold turnover rate (second reference)."
      - name: "Bron mutatiegraad uitponden (MU)_2"
        description: "Duplicate source indicator for sell turnover rate (second reference)."
      - name: "Bron overige kosten (OVK)"
        description: "Source indicator for other costs assumption."
      - name: "Bron overige opbrengsten (OVO)"
        description: "Source indicator for other income assumption."
      - name: "Bron technische splitsingskosten (TS)"
        description: "Source indicator for technical split costs assumption."
      - name: "Bron gedeelte niet verkopen bij mutatie (VM)"
        description: "Source indicator for non-sale-at-vacancy fraction assumption."
      - name: "Gemeente"
        description: "Municipality name."
      - name: "COROP-gebied"
        description: "COROP region name."
      - name: "Regio"
        description: "Broader geographic region name."
      - name: "Krimp/aardbeving"
        description: "Shrinkage or earthquake risk region indicator."
      - name: "COROP-plusgebieden Code"
        description: "COROP-plus region geographic code."
      - name: "COROP-plusgebieden Naam"
        description: "COROP-plus region name."
      - name: "Provincies Code"
        description: "Province geographic code."
      - name: "Provincies Naam"
        description: "Province name."
