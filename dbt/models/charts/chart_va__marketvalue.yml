version: 2

models:
  - name: chart_va__marketvalue
    description: "Chart input for market value-driver preparation. Grain: one row per difference-analysis step and corporation. Required columns include Jaar, Corporatie, groupName, stepName, and residential step effect columns."
    columns:
      - name: "stepName"
        description: "Waterfall step identifier for value-driver analysis."
      - name: "groupName"
        description: "Group label for waterfall step visualization."
      - name: "textualExplainer"
        description: "Human-readable explanation of this waterfall step."
      - name: "valuePerClassificationAndModel.DAEB.RESIDENTIAL.value"
        description: "Market value for DAEB residential at this waterfall step."
      - name: "valuePerClassificationAndModel.DAEB.RESIDENTIAL.deltaWithPreviousStep"
        description: "Market value change from prior step, DAEB residential."
      - name: "valuePerClassificationAndModel.DAEB.RESIDENTIAL.relativeDifferenceWithFirstStep"
        description: "Relative market value change vs first step, DAEB residential."
      - name: "valuePerClassificationAndModel.DAEB.RESIDENTIAL.numericalExplainers"
        description: "Numerical breakdown for DAEB residential at this step."
      - name: "valuePerClassificationAndModel.DAEB.PARKING.value"
