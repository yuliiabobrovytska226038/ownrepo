version: 2

models:
  - name: chart_waardeontwikkeling_won__bs_fl
    description: "Chart input for the marktwaarde versus beleidswaarde full/basis split value-development bar. Grain: one row per value type, waarderingstype, and year. Required columns include Waarde, Waarderingstype, Jaar, current/prior value columns, Aantal VHE, and mutation columns."
    columns:
      - name: "Waarde"
        description: "Value type label (market or policy value)."
      - name: "Waarderingstype"
        description: "Valuation type (e.g. marktwaarde, beleidswaarde)."
      - name: "Jaar"
        description: "Valuation year."
      - name: "Marktwaarde"
        description: "Total market value in the current year."
      - name: "Marktwaarde_2023"
        description: "Total market value in the prior year (2023)."
      - name: "Beleidswaarde"
        description: "Total policy value in the current year."
      - name: "Beleidswaarde_2023"
        description: "Total policy value in the prior year (2023)."
      - name: "Aantal VHE"
        description: "Number of rental units (VHE) included."
      - name: "Waardeontwikkeling"
        description: "Value development label or category."
      - name: "€ Mutatie"
        description: "Absolute euro change in value year-on-year."
      - name: "% Mutatie"
        description: "Year-on-year percentage change in value."
      - name: "Index Mutatie"
        description: "Cumulative index mutation relative to a base year."
      - name: "Text"
        description: "Display annotation text for the chart bar."
