version: 2

models:
  - name: chart_vhg__marktwaarde_source
    description: "Chart input for market-value VHG charts. Grain: one row per VHE for the chart year. Required columns include corporation, geography, waarderingstype, current/prior VHG values, and VHG source flags."
    columns:
      - name: "VHE-nr"
        description: "Rental unit identifier (VHE number)."
      - name: "Waarderingscomplex"
        description: "Valuation complex code."
      - name: "Corporatie"
        description: "Housing corporation name."
      - name: "Werkmaatschappij"
        description: "Operating company name within the corporation."
      - name: "Vastgoedcategorie"
        description: "Real estate category (DAEB or Niet-DAEB)."
      - name: "Classificatie"
        description: "DAEB/Niet-DAEB classification label."
      - name: "Waarderingsmodel"
        description: "Valuation model (Doorexploiteren or Uitponden)."
      - name: "Handboektype"
        description: "Property type per handbook (Woning, BOG, MOG, ZOG, Parkeren)."
      - name: "Jaar"
        description: "Valuation year."
      - name: "Peildatum"
        description: "Valuation reference date."
      - name: "Netto huur"
        description: "Net annual rent for this rental unit."
      - name: "WOZ-waarde"
        description: "Municipal property tax (WOZ) assessed value."
      - name: "Marktwaarde"
        description: "Market value of this rental unit."
      - name: "Beleidswaarde"
        description: "Policy value of this rental unit."
      - name: "Beschikbaarheid (scenario)"
        description: "Availability scenario policy discount component."
      - name: "Beschikbaarheid (eindwaarde)"
        description: "Availability terminal value policy discount component."
      - name: "Beschikbaarheid (overdrachtskosten)"
        description: "Availability transfer cost policy discount component."
      - name: "Beschikbaarheid (60 jaar)"
        description: "Availability 60-year horizon policy discount component."
      - name: "Beschikbaarheid_totaal"
        description: "Total availability policy discount correction."
      - name: "Betaalbaarheid"
        description: "Affordability policy discount correction."
      - name: "Kwaliteit (onderhoud)"
        description: "Quality maintenance policy discount component."
      - name: "Kwaliteit (EFG-labels)"
        description: "Quality EFG energy label policy discount component."
      - name: "Kwaliteit_totaal"
        description: "Total quality policy discount correction."
      - name: "Beheer"
        description: "Management policy discount correction."
      - name: "Disconteringsvoet"
        description: "Discount rate applied for market valuation."
      - name: "Beleidshuur"
        description: "Policy rent assumption used in beleidswaarde calculation."
