version: 2

models:
  - name: chart_va__policyvalue
    description: "Chart input for policy value-driver preparation. Grain: one row per difference-analysis step and corporation. Required columns include Jaar, Corporatie, groupName, stepName, and residential step effect columns."
    columns:
      - name: "stepName"
        description: "Waterfall step identifier for policy value-driver analysis."
      - name: "groupName"
        description: "Group label for policy value waterfall step visualization."
      - name: "textualExplainer"
        description: "Human-readable explanation of this policy value waterfall step."
      - name: "valuePerClassificationAndModel.DAEB.RESIDENTIAL.value"
        description: "Policy value for DAEB residential at this waterfall step."
      - name: "valuePerClassificationAndModel.DAEB.RESIDENTIAL.deltaWithPreviousStep"
        description: "Policy value change from prior step, DAEB residential."
      - name: "valuePerClassificationAndModel.DAEB.RESIDENTIAL.relativeDifferenceWithFirstStep"
        description: "Relative policy value change vs first step, DAEB residential."
      - name: "valuePerClassificationAndModel.DAEB.RESIDENTIAL.numericalExplainers"
        description: "Numerical breakdown for DAEB residential policy value step."
      - name: "valuePerClassificationAndModel.DAEB.PARKING.value"
        description: "Policy value for DAEB parking at this waterfall step."
      - name: "valuePerClassificationAndModel.DAEB.PARKING.deltaWithPreviousStep"
        description: "Policy value change from prior step, DAEB parking."
      - name: "valuePerClassificationAndModel.DAEB.PARKING.relativeDifferenceWithFirstStep"
        description: "Relative policy value change vs first step, DAEB parking."
      - name: "valuePerClassificationAndModel.DAEB.PARKING.numericalExplainers"
