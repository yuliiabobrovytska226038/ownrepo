        description: "Handbook exit yield for hold scenario."
      - name: "EY uitponden"
        description: "Applied exit yield for vacant-sale scenario."
      - name: "EY uitponden handboek"
        description: "Handbook exit yield for vacant-sale scenario."
      - name: "Bron scenario (SC)"
        description: "Source indicator for scenario parameter."
      - name: "SC waarde"
        description: "Applied scenario value."
      - name: "Bron mutatieonderhoud (MOH)"
        description: "Source indicator for turnover maintenance cost parameter."
      - name: "Bron markthuurstijging (MHS)"
        description: "Source indicator for market rent growth parameter."
      - name: "Bron leegwaardestijging verleden (LSV)"
