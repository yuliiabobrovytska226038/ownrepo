version: 2

models:
  - name: dataset_validatie
    description: "Filtered subset of dataset_basis for Woningen valuation model only."
    columns:
      - name: "VHE-nr"
        description: "Unique rental unit identifier."
      - name: "Waarderingscomplex"
        description: "Valuation complex grouping the rental units."
      - name: "Corporatie"
        description: "Housing corporation name."
      - name: "Werkmaatschappij"
        description: "Operating subsidiary or business entity."
      - name: "Vastgoedcategorie"
        description: "Real estate category (DAEB or Niet-DAEB)."
      - name: "Classificatie"
        description: "Portfolio classification (DAEB or Niet-DAEB)."
      - name: "Handboektype"
        description: "Property handbook type (Woning, BOG, MOG, ZOG, Parkeren)."
      - name: "Jaar"
        description: "Valuation year."
      - name: "Peildatum"
        description: "Valuation reference date (Dec 31)."
      - name: "Netto huur"
        description: "Net rent income for the rental unit."
      - name: "WOZ-waarde"
        description: "Municipal property tax value (WOZ)."
      - name: "Marktwaarde"
        description: "Market value of the rental unit."
      - name: "Beleidswaarde"
        description: "Policy value (social/regulated use value)."
      - name: "Beschikbaarheid (scenario)"
        description: "Availability policy score: scenario component."
      - name: "Beschikbaarheid (eindwaarde)"
        description: "Availability policy score: terminal value component."
      - name: "Beschikbaarheid (overdrachtskosten)"
        description: "Availability policy score: transfer costs component."
      - name: "Beschikbaarheid (60 jaar)"
        description: "Availability policy score: 60-year horizon component."
      - name: "Beschikbaarheid_totaal"
        description: "Total availability policy score."
      - name: "Betaalbaarheid"
        description: "Affordability policy score component."
      - name: "Kwaliteit (onderhoud)"
        description: "Quality policy score: maintenance component."
      - name: "Kwaliteit (EFG-labels)"
        description: "Quality policy score: poor energy labels (EFG) component."
      - name: "Kwaliteit_totaal"
        description: "Total quality policy score."
      - name: "Beheer"
        description: "Management policy score component."
      - name: "Disconteringsvoet"
        description: "Discount rate used in market value calculation."
      - name: "Beleidshuur"
        description: "Policy rent applied in beleidswaarde calculation."
