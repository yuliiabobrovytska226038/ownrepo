version: 2

sources:
  - name: apis
    schema: apis
    description: "Company metadata from the TMS API."
    tables:
      - name: company_valuation_data
        description: "Partitioned Q4 valuation rounds and valuations per company."
        columns:
          - name: "company_id"
            description: "Internal TMS identifier for the housing corporation."
          - name: "valuation_round_id"
            description: "TMS identifier for the valuation round."
          - name: "round_data_set_id"
            description: "TMS dataset identifier for the valuation round."
          - name: "issue_year"
            description: "Year of the Q4 valuation round issue date."
          - name: "issue_quarter"
            description: "Quarter of the valuation round issue date."
          - name: "issue_date"
            description: "Issue date of the valuation round (always Dec 31)."
          - name: "round_status"
            description: "Status of the valuation round in TMS."
          - name: "round_is_free"
            description: "Whether the valuation round is a free non-billable round."
          - name: "valuation_id"
            description: "TMS identifier for the individual valuation."
          - name: "valuation_data_set_id"
            description: "TMS dataset identifier for the individual valuation."
          - name: "valuation_name"
            description: "Display name of the valuation in TMS."
          - name: "model_year"
            description: "Valuation model year used for the calculation."
          - name: "archived_date_time"
            description: "Timestamp when the valuation was archived in TMS."
          - name: "creation_date_time"
            description: "Timestamp when the valuation was created in TMS."
          - name: "data_set_update_date_time"
            description: "Timestamp of the most recent dataset update."
          - name: "avm_issue_date"
            description: "AVM model issue date for the valuation."
          - name: "is_old_data_set"
            description: "Whether the dataset uses an older schema format."
          - name: "has_changed_parameters"
            description: "Whether parameters changed since the previous round."
          - name: "is_new_calculation_rules"
            description: "Whether new calculation rules apply to this valuation."
          - name: "sub_portfolio_id"
            description: "TMS identifier for the sub-portfolio."
          - name: "sub_portfolio_name"
            description: "Display name of the sub-portfolio (e.g., BASIC, FULL)."
          - name: "sub_portfolio_valuation_level"
            description: "Valuation level of the sub-portfolio."
