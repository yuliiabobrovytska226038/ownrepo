version: 2

sources:
  - name: tms
    schema: tms
    description: "Raw TMS report tables materialized by Dagster assets."
    tables:
      - name: ratio_rapport_complex
        description: "Ratio rapport at complex level."
        columns:
          - name: "Waarderingscomplex"
            description: "Valuation complex code."
          - name: "Complexnaam"
            description: "Name of the valuation complex."
          - name: "Deelportefeuille"
            description: "Sub-portfolio classification."
          - name: "Straatnaam"
            description: "Street name of the complex location."
          - name: "Scenario"
            description: "Valuation scenario (doorexploiteren or uitponden)."
          - name: "Model"
            description: "Valuation model applied."
          - name: "Aantal VHE's"
            description: "Total number of rental units in the complex."
          - name: "Aantal VHE's leegstaand"
            description: "Number of vacant rental units in the complex."
          - name: "Percentage leegstaand in complex"
            description: "Vacancy percentage within the complex."
          - name: "Netto Marktwaarde"
            description: "Total net market value of the complex."
          - name: "Gemiddelde marktwaarde"
            description: "Average market value per rental unit in the complex."
          - name: "Netto marktwaarde (DE)"
            description: "Net market value under hold (doorexploiteren) scenario."
          - name: "Netto marktwaarde (UP)"
            description: "Net market value under exit (uitponden) scenario."
          - name: "Bruto marktwaarde (DE)"
            description: "Gross market value under hold scenario."
          - name: "Bruto marktwaarde (UP)"
            description: "Gross market value under exit scenario."
          - name: "Marktwaarde DE / UP"
            description: "Flag indicating whether hold or exit scenario drives market value."
          - name: "Marktwaarde excl. correcties"
            description: "Market value excluding deferred maintenance and ground lease corrections."
          - name: "Correctie achterstallig onderhoud"
            description: "Deferred maintenance correction applied to market value."
          - name: "Correctie erfpacht"
            description: "Ground lease correction applied to market value."
          - name: "Oppervlakte GBO of VVO"
            description: "Total floor area in gross lettable or usable square metres."
          - name: "Oppervlakte GBO of VVO per VHE"
            description: "Floor area per rental unit."
          - name: "Oppervlakte BVO"
            description: "Total gross floor area (BVO) in square metres."
          - name: "Marktwaarde per m² GBO of VVO"
            description: "Market value per square metre of floor area."
          - name: "WOZ-waarde per VHE"
            description: "Municipal property assessment (WOZ) value per rental unit."
          - name: "Leegwaarde"
            description: "Total vacant possession value of the complex."
          - name: "Leegwaarde per VHE"
            description: "Vacant possession value per rental unit."
          - name: "Huur / Leegwaarde"
            description: "Ratio of contract rent to vacant possession value."
          - name: "Theoretische huurinkomsten / Leegwaarde"
            description: "Ratio of theoretical rent income to vacant possession value."
          - name: "Eindwaarde / Leegwaarde"
            description: "Ratio of terminal value to vacant possession value."
          - name: "Marktwaarde / WOZ-waarde"
            description: "Ratio of market value to WOZ assessment value."
          - name: "Marktwaarde / Leegwaarde"
            description: "Ratio of market value to vacant possession value."
          - name: "Leegwaarde per m² GBO of VVO"
            description: "Vacant possession value per square metre of floor area."
          - name: "Onderhoud per VHE"
            description: "Annual maintenance cost per rental unit."
          - name: "Onderhoud per m² GBO of BVO"
            description: "Maintenance cost per square metre."
          - name: "BAR kk (contracthuur)"
            description: "Gross initial yield on contract rent (kosten koper)."
          - name: "NAR kk (contracthuur)"
            description: "Net initial yield on contract rent (kosten koper)."
          - name: "KF kk (contracthuur)"
            description: "Capital factor (kosten koper) based on contract rent."
          - name: "KF kk (markthuur)"
            description: "Capital factor (kosten koper) based on market rent."
          - name: "KF kk (theoretische huur)"
            description: "Capital factor (kosten koper) based on theoretical rent."
          - name: "KF kk excl. correcties (contracthuur)"
            description: "Capital factor excluding corrections, based on contract rent."
          - name: "Exploitatiekosten (DE) per m² GBO of BVO"
            description: "Operating costs per square metre under hold scenario."
          - name: "Contracthuur per maand"
            description: "Total monthly contract rent for the complex."
          - name: "Potentiële huur per maand"
            description: "Total monthly potential rent for the complex."
          - name: "Theoretische huurinkomsten per maand"
            description: "Total monthly theoretical rent income for the complex."
          - name: "Exploitatiekosten (DE)"
            description: "Total operating costs under hold scenario."
          - name: "Exploitatiekosten (DE) / contracthuur per jaar"
            description: "Operating cost ratio relative to annual contract rent."
          - name: "Contracthuur (jaar) per m² GBO of VVO"
            description: "Annual contract rent per square metre of floor area."
          - name: "Markthuur per maand"
            description: "Total monthly market rent for the complex."
          - name: "Markthuur (jaar) per m² GBO of VVO"
            description: "Annual market rent per square metre of floor area."
          - name: "Maximale huur per maand"
            description: "Total maximum permitted monthly rent for the complex."
          - name: "Exploitatieverplichting"
            description: "Operating obligation status indicator."
          - name: "Mutatiegraad DE"
            description: "Average tenant turnover rate under hold scenario."
          - name: "Mutatiegraad UP"
            description: "Average tenant turnover rate under exit scenario."
          - name: "Energielabel"
            description: "Dominant energy performance label for the complex."
          - name: "Disconteringsvoet"
            description: "Blended discount rate applied in valuation."
          - name: "Disconteringsvoet DE"
            description: "Discount rate for hold (doorexploiteren) scenario."
          - name: "Disconteringsvoet UP"
            description: "Discount rate for exit (uitponden) scenario."
          - name: "Exit yield"
            description: "Blended exit yield at end of projection horizon."
          - name: "Exit yield DE"
            description: "Exit yield applied at end of hold scenario horizon."
          - name: "Exit yield UP"
            description: "Exit yield applied at end of exit scenario horizon."
          - name: "Huur / Leegwaarde jaar 15 DE"
            description: "Rent-to-vacant-value ratio at year 15, hold scenario."
          - name: "Huur / Leegwaarde jaar 15 UP"
            description: "Rent-to-vacant-value ratio at year 15, exit scenario."
          - name: "Markthuur jaar 15"
            description: "Projected total market rent at year 15."
          - name: "Contracthuur jaar 15"
            description: "Projected total contract rent at year 15."
          - name: "Contante waarde contract"
            description: "Present value of remaining lease contracts."
          - name: "WAULT"
            description: "Weighted average unexpired lease term (in years)."
          - name: "Corporatie"
            description: "Housing corporation name."
          - name: "Jaar"
            description: "Valuation year."
          - name: "Peildatum"
            description: "Valuation reference date (Dec 31)."
