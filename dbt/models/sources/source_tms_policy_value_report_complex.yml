version: 2

sources:
  - name: tms
    schema: tms
    description: "Raw TMS report tables materialized by Dagster assets."
    tables:
      - name: policy_value_report_complex
        description: "Beleidswaarderapport at complex level."
        columns:
          - name: "Waarderingscomplex"
            description: "Valuation complex code."
          - name: "Complexnaam"
            description: "Name of the valuation complex."
          - name: "Deelportefeuille"
            description: "Sub-portfolio classification."
          - name: "Straatnaam"
            description: "Street name of the complex location."
          - name: "Scenario"
            description: "Valuation scenario (doorexploiteren or uitponden)."
          - name: "Model"
            description: "Valuation model applied."
          - name: "Aantal VHE's"
            description: "Total number of rental units in the complex."
          - name: "Aantal VHE's leegstaand"
            description: "Number of vacant rental units in the complex."
          - name: "Percentage leegstaand in complex"
            description: "Vacancy percentage within the complex."
          - name: "Marktwaarde"
            description: "Total market value of the complex."
          - name: "Beschikbaarheid (scenario)"
            description: "Availability policy component under the selected scenario."
          - name: "Beschikbaarheid (eindwaarde)"
            description: "Availability policy component in terminal value."
          - name: "Beschikbaarheid (60 jaar)"
            description: "Availability policy component over 60-year horizon."
          - name: "Beschikbaarheid (overdrachtskosten)"
            description: "Availability deduction for transfer costs in policy value."
          - name: "Betaalbaarheid"
            description: "Affordability component of policy value."
          - name: "Kwaliteit (onderhoud)"
            description: "Quality component from maintenance cost adjustments."
          - name: "Kwaliteit (EFG-labels)"
            description: "Quality component from EFG energy label obligation."
          - name: "Beheer"
            description: "Management component of policy value."
          - name: "Disconteringsvoet"
            description: "Discount rate applied in policy value calculation."
          - name: "Beleidswaarde"
            description: "Total policy value of the complex."
          - name: "Beleidswaarde per VHE"
            description: "Policy value per rental unit."
          - name: "Beleidswaarde / Marktwaarde"
            description: "Ratio of policy value to market value."
          - name: "Beleidshuur per VHE"
            description: "Policy rent assumption per rental unit."
          - name: "Beleidsonderhoud per VHE (norm)"
            description: "Policy maintenance norm per rental unit."
          - name: "Beleidsbeheer per VHE"
            description: "Policy management cost per rental unit."
          - name: "Methode reg. huurstijging boven infl. blw"
            description: "Method for regulated rent growth above inflation in policy value."
          - name: "Reg. huurstijging boven infl. blw jaar 1"
            description: "Regulated rent growth above inflation in year 1 (policy value)."
          - name: "Reg. huurstijging boven infl. blw jaar 2"
            description: "Regulated rent growth above inflation in year 2 (policy value)."
          - name: "Reg. huurstijging boven infl. blw jaar 3"
            description: "Regulated rent growth above inflation in year 3 (policy value)."
          - name: "Reg. huurstijging boven infl. blw jaar 4"
            description: "Regulated rent growth above inflation in year 4 (policy value)."
          - name: "Reg. huurstijging boven infl. blw jaar 5"
            description: "Regulated rent growth above inflation in year 5 (policy value)."
          - name: "Reg. huurstijging boven infl. blw jaar 6"
            description: "Regulated rent growth above inflation in year 6 (policy value)."
          - name: "Corporatie"
            description: "Housing corporation name."
          - name: "Jaar"
            description: "Valuation year."
          - name: "Peildatum"
            description: "Valuation reference date (Dec 31)."
          - name: "Kwaliteit"
            description: "Combined policy-value quality adjustment from the policy value report."
