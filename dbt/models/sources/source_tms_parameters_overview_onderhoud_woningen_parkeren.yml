version: 2

sources:
  - name: tms
    schema: tms
    description: "Raw TMS report tables materialized by Dagster assets."
    tables:
      - name: parameters_overview_onderhoud_woningen_parkeren
        columns:
          - name: "Waarderingscomplex"
            description: "TMS valuation complex code."
          - name: "Complexnaam"
            description: "Name of the valuation complex."
          - name: "VHE-nr"
            description: "Rental unit (VHE) number."
          - name: "Adres"
            description: "Street address of the rental unit."
          - name: "Model"
            description: "Valuation model applied to the unit."
          - name: "Handboektype"
            description: "Handbook type classification for the unit."
          - name: "Classificatie"
            description: "Asset classification (e.g., DAEB, Niet-DAEB)."
          - name: "Bron Onderhoud (OH)"
            description: "Source of the applied maintenance cost parameter."
          - name: "OH doorexploiteren handboek"
            description: "Handbook routine maintenance cost for continue-to-let scenario."
          - name: "OH uitponden handboek"
            description: "Handbook routine maintenance cost for sell-on-vacancy scenario."
          - name: "OH doorexploiteren"
            description: "Applied routine maintenance cost for continue-to-let scenario."
          - name: "OH uitponden"
            description: "Applied routine maintenance cost for sell-on-vacancy scenario."
          - name: "Bron mutatieonderhoud (MOH)"
            description: "Source of the applied turnover maintenance cost parameter."
          - name: "MOH doorexploiteren"
            description: "Applied turnover maintenance cost for continue-to-let scenario."
          - name: "MOH uitponden"
            description: "Applied turnover maintenance cost for sell-on-vacancy scenario."
          - name: "Achterstallig onderhoud"
            description: "Deferred maintenance backlog amount for the unit."
          - name: "Corporatie"
            description: "Housing corporation name."
          - name: "Jaar"
            description: "Valuation year."
          - name: "Peildatum"
            description: "Valuation reference date (Dec 31)."
