version: 2

sources:
  - name: tms
    schema: tms
    description: "Raw TMS report tables materialized by Dagster assets."
    tables:
      - name: complex_kenmerken
        description: "Kwalitatieve kenmerken per complex."
        columns:
          - name: "Complexcode"
            description: "Valuation complex code."
          - name: "Waarderingsmodel"
            description: "Valuation model (doorexploiteren or uitponden)."
          - name: "Deelportefeuille"
            description: "Sub-portfolio designation (BASIC or FULL)."
          - name: "Naam van de taxateur"
            description: "Name of the appraiser who conducted the valuation."
          - name: "Doel taxatie"
            description: "Purpose of the appraisal."
          - name: "Type taxatie"
            description: "Type of appraisal conducted."
          - name: "Gebruikssituatie"
            description: "Current usage situation of the complex."
          - name: "Eigendomssituatie"
            description: "Ownership situation of the complex."
          - name: "Objectomschrijving"
            description: "Descriptive summary of the property object."
          - name: "Onderhoudsstaat"
            description: "Maintenance condition assessment of the complex."
          - name: "Uitgangspunten"
            description: "Valuation assumptions and starting points."
          - name: "Locatieomschrijving"
            description: "Narrative description of the complex location."
          - name: "Locatiebeoordeling"
            description: "Quality assessment score for the location."
          - name: "Bereikbaarheid"
            description: "Accessibility rating of the complex."
          - name: "Verhuurbaarheid"
            description: "Rental appeal or leasability assessment of the complex."
          - name: "Verkoopbaarheid"
            description: "Salability or marketability assessment of the complex."
          - name: "Bezichtigingsdatum"
            description: "Date of the physical inspection visit."
          - name: "Sterkte (SWOT)"
            description: "SWOT strength assessment for the complex."
          - name: "Zwakte (SWOT)"
            description: "SWOT weakness assessment for the complex."
          - name: "Kans (SWOT)"
            description: "SWOT opportunity assessment for the complex."
          - name: "Bedreiging (SWOT)"
            description: "SWOT threat assessment for the complex."
          - name: "Corporatie"
            description: "Housing corporation name."
          - name: "Jaar"
            description: "Valuation year."
          - name: "Peildatum"
            description: "Valuation reference date (Dec 31)."
