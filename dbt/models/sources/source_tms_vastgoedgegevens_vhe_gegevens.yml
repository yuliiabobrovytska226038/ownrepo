version: 2

sources:
  - name: tms
    schema: tms
    description: "Raw TMS report tables materialized by Dagster assets."
    freshness:
      warn_after: {count: 90, period: day}
      error_after: {count: 180, period: day}
    loaded_at_field: "Peildatum"
    tables:
      - name: vastgoedgegevens_vhe_gegevens
        description: "VGR real estate data at VHE level."
        columns:
          - name: "VHE-nummer"
            description: "Rental unit number (VHE identifier)."
          - name: "Vastgoedcategorie"
            description: "Real estate category of the rental unit."
          - name: "Straatnaam"
            description: "Street name of the unit address."
          - name: "Huisnummer"
            description: "House number of the unit address."
          - name: "Toevoeging"
            description: "House number suffix or addition."
          - name: "Postcode"
            description: "Postal code of the rental unit."
          - name: "Waarderingscomplex"
            description: "Valuation complex code this unit belongs to."
          - name: "Classificatie"
            description: "Classification of the rental unit type."
          - name: "Bouwjaar"
            description: "Construction year of the unit."
          - name: "Startdatum contract"
            description: "Rental contract start date for the unit."
          - name: "Renovatiejaar"
            description: "Year of last renovation for the unit."
          - name: "Gebruiksoppervlakte"
            description: "Usable floor area of the unit in m2."
          - name: "Zelfstandig"
            description: "Indicates whether the unit is self-contained."
          - name: "WOZ-waarde primo jaar-1"
            description: "WOZ tax value at start of the prior year."
          - name: "Achterstallig onderhoud"
            description: "Deferred maintenance amount for the unit."
          - name: "Leegstand"
            description: "Indicates whether the unit is currently vacant."
          - name: "Netto huur"
            description: "Net rent amount for the unit."
          - name: "Methode maximale huur"
            description: "Method used to determine the maximum allowable rent."
          - name: "WWS-punten"
            description: "Housing quality points (Woningwaarderingsstelsel score)."
          - name: "Maximale huur excl. opslag"
            description: "Maximum rent excluding surcharges."
          - name: "Beschermd bezit"
            description: "Indicates whether the unit is protected or restricted."
          - name: "Nieuwbouwopslag"
            description: "New construction rent surcharge amount."
          - name: "Segment huurregime"
            description: "Rent regulation segment (social or free sector)."
          - name: "Markthuur"
            description: "Market rent applicable to the unit."
          - name: "Beklemmingshuur"
            description: "Encumbered or restricted rent amount."
          - name: "Laatste jaar huurbeklemming"
            description: "Final year of the rent encumbrance period."
          - name: "EPV"
            description: "Energy performance fee (energieprestatievergoeding)."
          - name: "Energieprestatie (EP2)"
            description: "Energy performance label under the EP2 standard."
          - name: "Handboektype"
            description: "Handbook type classification for the unit."
          - name: "Erfpacht waardecorrectie doorexploiteren"
            description: "Ground lease value correction for the hold scenario."
          - name: "Erfpacht waardecorrectie uitponden"
            description: "Ground lease value correction for the vacant sale scenario."
          - name: "BVO (m2)"
            description: "Gross floor area of the unit in m2."
          - name: "VVO (m2)"
            description: "Net usable floor area of the unit in m2."
          - name: "Aantal contracten"
            description: "Number of rental contracts on the unit."
          - name: "Aantal plekken"
            description: "Number of places or spots (e.g., parking, care)."
          - name: "Einddatum contract"
            description: "Rental contract end date for the unit."
          - name: "Nieuw huurcontract"
            description: "Indicates whether a new rental contract is in place."
          - name: "Looptijd bij herziening"
            description: "Contract duration applicable at rent review."
          - name: "Contracttype"
            description: "Type of rental contract."
          - name: "Contracthuur jaar 1"
            description: "Contract rent in forecast year 1."
          - name: "Contracthuur jaar 2"
            description: "Contract rent in forecast year 2."
          - name: "Contracthuur jaar 3"
            description: "Contract rent in forecast year 3."
          - name: "Contracthuur jaar 4"
            description: "Contract rent in forecast year 4."
          - name: "Contracthuur jaar 5"
            description: "Contract rent in forecast year 5."
          - name: "Contracthuur jaar 6"
            description: "Contract rent in forecast year 6."
          - name: "Contracthuur jaar 7"
            description: "Contract rent in forecast year 7."
          - name: "Contracthuur jaar 8"
            description: "Contract rent in forecast year 8."
          - name: "Contracthuur jaar 9"
            description: "Contract rent in forecast year 9."
          - name: "Contracthuur jaar 10"
            description: "Contract rent in forecast year 10."
          - name: "Contracthuur jaar 11"
            description: "Contract rent in forecast year 11."
          - name: "Contracthuur jaar 12"
            description: "Contract rent in forecast year 12."
          - name: "Contracthuur jaar 13"
            description: "Contract rent in forecast year 13."
          - name: "Contracthuur jaar 14"
            description: "Contract rent in forecast year 14."
          - name: "Contracthuur jaar 15"
            description: "Contract rent in forecast year 15."
          - name: "Straatnaam (opgezocht)"
            description: "Street name resolved via address lookup."
          - name: "Gemeente (opgezocht)"
            description: "Municipality resolved via address lookup."
          - name: "Plaatsnaam (opgezocht)"
            description: "City or town name resolved via address lookup."
          - name: "Wijk (opgezocht)"
            description: "District resolved via address lookup."
          - name: "Buurt (opgezocht)"
            description: "Neighbourhood resolved via address lookup."
          - name: "Buurtcode (opgezocht)"
            description: "Neighbourhood code resolved via address lookup."
          - name: "BAG pand id (opgezocht)"
            description: "BAG building identifier resolved via address lookup."
          - name: "BAG verblijfsobject id (opgezocht)"
            description: "BAG dwelling object identifier resolved via address lookup."
          - name: "Corporatie"
            description: "Housing corporation name."
          - name: "Jaar"
            description: "Valuation year."
          - name: "Peildatum"
            description: "Valuation reference date (Dec 31)."
