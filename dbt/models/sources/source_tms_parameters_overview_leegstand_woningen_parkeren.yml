version: 2

sources:
  - name: tms
    schema: tms
    description: "Raw TMS report tables materialized by Dagster assets."
    tables:
      - name: parameters_overview_leegstand_woningen_parkeren
        columns:
          - name: "Waarderingscomplex"
            description: "TMS valuation complex code."
          - name: "Complexnaam"
            description: "Name of the valuation complex."
          - name: "VHE-nr"
            description: "TMS rental unit (VHE) number."
          - name: "Adres"
            description: "Street address of the rental unit."
          - name: "Model"
            description: "Valuation model applied to the unit."
          - name: "Handboektype"
            description: "Handbook type used for parameter derivation."
          - name: "Classificatie"
            description: "Property classification within the valuation."
          - name: "Bron aanvangsleegstand (AL)"
            description: "Source of the initial vacancy period parameter."
          - name: "AL handboek waarde (maanden)"
            description: "Handbook initial vacancy duration in months."
          - name: "AL waarde (maanden)"
            description: "Applied initial vacancy duration in months."
          - name: "Bron mutatieleegstand (ML)"
            description: "Source of the turnover vacancy period parameter."
          - name: "ML handboek waarde (maanden)"
            description: "Handbook turnover vacancy duration in months."
          - name: "ML waarde (maanden)"
            description: "Applied turnover vacancy duration in months."
          - name: "Corporatie"
            description: "Housing corporation name."
          - name: "Jaar"
            description: "Valuation year."
          - name: "Peildatum"
            description: "Valuation reference date (Dec 31)."
