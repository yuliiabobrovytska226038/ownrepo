version: 2

sources:
  - name: tms
    schema: tms
    description: "Raw TMS report tables materialized by Dagster assets."
    tables:
      - name: valuation_overview_vhe
        description: "Waardeoverzicht at VHE level."
        columns:
          - name: "VHE-nr"
            description: "Unique rental unit identifier."
          - name: "Waarderingscomplex"
            description: "Valuation complex code."
          - name: "Complexnaam"
            description: "Name of the valuation complex."
          - name: "Deelportefeuille"
            description: "Sub-portfolio classification."
          - name: "Adres"
            description: "Street address of the rental unit."
          - name: "Postcode"
            description: "Postal code of the rental unit."
          - name: "Scenario"
            description: "Valuation scenario (doorexploiteren or uitponden)."
          - name: "Model"
            description: "Valuation model applied."
          - name: "Bouwjaar"
            description: "Construction year of the property."
          - name: "Handboektype"
            description: "Property handbook type (Woning, BOG, MOG, etc.)."
          - name: "Classificatie"
            description: "DAEB or niet-DAEB portfolio classification."
          - name: "Energielabel"
            description: "Energy performance label."
          - name: "Huur"
            description: "Annual contracted rent income."
          - name: "Incentives"
            description: "Rent incentives or concessions deducted from income."
          - name: "Huurderving"
            description: "Total rental income loss allowance (vacancy)."
          - name: "Huurderving mutatieleegstand"
            description: "Rental income loss from turnover vacancy."
          - name: "Huurderving aanvangsleegstand"
            description: "Rental income loss from initial vacancy."
          - name: "Mutatiekosten"
            description: "Tenant turnover re-letting costs."
          - name: "Onderhoud"
            description: "Total annual maintenance costs."
          - name: "Mutatieonderhoud bij doorexp."
            description: "Maintenance between tenancies under hold scenario."
          - name: "Mutatieonderhoud bij verkoop"
            description: "Maintenance between tenancies upon vacant sale."
          - name: "Beheerkosten"
            description: "Property management costs."
          - name: "Belastingen en verzekeringen"
            description: "Taxes and insurance charges."
          - name: "OZB"
            description: "Municipal property tax (onroerend zaak belasting)."
          - name: "Servicekosten"
            description: "Service charges passed through to tenants."
          - name: "Erfpacht"
            description: "Annual ground lease charge."
          - name: "Splitsingskosten"
            description: "Apartment deed splitting costs."
          - name: "Verplichting EFG-labels"
            description: "Cost obligation for EFG energy label compliance."
          - name: "Energieprestatievergoeding"
            description: "Energy performance compensation received from tenant."
          - name: "Overige opbrengsten"
            description: "Other miscellaneous revenue items."
          - name: "Overige kosten"
            description: "Other miscellaneous operating costs."
          - name: "Verkoopkosten"
            description: "Sales transaction costs upon vacant disposal."
          - name: "Verkoopopbrengsten"
            description: "Proceeds from vacant possession sale."
          - name: "Eindwaarde"
            description: "Terminal value at end of DCF projection horizon."
          - name: "Effect afkapping"
            description: "Value effect from capping the DCF horizon."
          - name: "Bruto marktwaarde"
            description: "Gross market value before deducting transfer costs."
          - name: "Overdrachtskosten"
            description: "Transfer and transaction costs deducted from gross value."
          - name: "Netto marktwaarde"
            description: "Net market value after deducting transfer costs."
          - name: "Corporatie"
            description: "Housing corporation name."
          - name: "Jaar"
            description: "Valuation year."
          - name: "Peildatum"
            description: "Valuation reference date (Dec 31)."
