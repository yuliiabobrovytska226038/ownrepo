version: 2

sources:
  - name: tms
    schema: tms
    description: "Raw TMS report tables materialized by Dagster assets."
    tables:
      - name: parameters_overview_onderhoud_bog_mog_zog
        columns:
          - name: "Waarderingscomplex"
            description: "TMS valuation complex code."
          - name: "Complexnaam"
            description: "Name of the valuation complex."
          - name: "VHE-nr"
            description: "Rental unit (VHE) number."
          - name: "Adres"
            description: "Street address of the rental unit."
          - name: "Model"
            description: "Valuation model applied to the unit."
          - name: "Handboektype"
            description: "Handbook type classification for the unit."
          - name: "Classificatie"
            description: "Asset classification (BOG, MOG, or ZOG)."
          - name: "Bron Onderhoud (OH)"
            description: "Source of the applied maintenance cost parameter."
          - name: "OH per m² BVO handboek waarde"
            description: "Handbook maintenance cost per square metre gross floor area."
          - name: "OH per m² BVO waarde"
            description: "Applied maintenance cost per square metre gross floor area."
          - name: "Achterstallig onderhoud per m2 BVO"
            description: "Deferred maintenance backlog per square metre gross floor area."
          - name: "Corporatie"
            description: "Housing corporation name."
          - name: "Jaar"
            description: "Valuation year."
          - name: "Peildatum"
            description: "Valuation reference date (Dec 31)."
