version: 2

sources:
  - name: tms
    schema: tms
    description: "Raw TMS report tables materialized by Dagster assets."
    tables:
      - name: parameters_overview_disconteringsvoet
        columns:
          - name: "Waarderingscomplex"
            description: "TMS valuation complex code."
          - name: "Complexnaam"
            description: "Name of the valuation complex."
          - name: "VHE-nr"
            description: "TMS rental unit (VHE) number."
          - name: "Adres"
            description: "Street address of the rental unit."
          - name: "Model"
            description: "Valuation model applied to the unit."
          - name: "Handboektype"
            description: "Handbook type used for parameter derivation."
          - name: "Classificatie"
            description: "Property classification within the valuation."
          - name: "Bron disconteringsvoet (DV)"
            description: "Source of the discount rate value."
          - name: "DV doorexploiteren handboek"
            description: "Handbook discount rate for the continue-to-let scenario."
          - name: "DV uitponden handboek"
            description: "Handbook discount rate for the sell-on-vacancy scenario."
          - name: "DV doorexploiteren"
            description: "Applied discount rate for the continue-to-let scenario."
          - name: "DV uitponden"
            description: "Applied discount rate for the sell-on-vacancy scenario."
          - name: "Corporatie"
            description: "Housing corporation name."
          - name: "Jaar"
            description: "Valuation year."
          - name: "Peildatum"
            description: "Valuation reference date (Dec 31)."
